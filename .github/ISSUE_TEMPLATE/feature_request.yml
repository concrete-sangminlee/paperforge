name: Feature Request
description: Suggest a new feature for PaperForge
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas! Please describe the feature you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions you've considered?
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Editor
        - Collaboration
        - Compilation
        - UI/UX
        - Security
        - Performance
        - Infrastructure
        - Other
    validations:
      required: true
